spring:
  web:
    resources:
      static-locations: file:uploads/,classpath:/static/
  datasource:
    url: jdbc:postgresql://localhost:5432/reuseu
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
